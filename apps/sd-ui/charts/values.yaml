# Default values for charts.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ${CI_REGISTRY_IMAGE}
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "$PROJECT_RELEASE_VERSION"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "sd-ui"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automountServiceAccountToken: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 4322

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    acme.cert-manager.io/http01-edit-in-place: "true"
    cert-manager.io/cluster-issuer: dev-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 5m
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: sd-ui.dev.simpl-europe.eu
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: sd-ui-tld-secret
      hosts:
        - sd-ui.dev.simpl-europe.eu

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  PUBLIC_AUTH_KEYCLOAK_SERVER_URL: "https://participant.be.dataprovider01.sandbox-cat-dat.simpl-europe.eu"
  PUBLIC_AUTH_KEYCLOAK_REALM: "participant"
  PUBLIC_AUTH_KEYCLOAK_CLIENT_ID: "frontend-cli"
  PUBLIC_CREATION_WIZARD_API_URL: "https://participant.be.dataprovider01.sandbox-cat-dat.simpl-europe.eu/sdtooling-api"
  PUBLIC_CREATION_WIZARD_API_VERSION: "v2"
  PUBLIC_SIGNER_URL: "https://t1.gaiax-edc-dev-sd.dev.simpl-europe.eu/signer"

livenessProbe:
  httpGet:
    path: /status
    port: http
readinessProbe:
  httpGet:
    path: /status
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
